    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is GEO and why does it matter?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "GEO stands for Generative Engine Optimization. It is the practice of making your site visible to AI assistants like ChatGPT, Gemini, Claude, and Perplexity. These are where a growing share of people now search for services. If your site is not structured for GEO, you are invisible to that traffic. Most audit tools do not score for this. Canopy Guard does."
          }
        },
        {
          "@type": "Question",
          "name": "What is AEO?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Answer Engine Optimization. It is the practice of structuring your content to directly answer questions. Voice search results, Google AI Overviews, and featured snippets all favor sites built for AEO. It overlaps with GEO but focuses on traditional answer engines and search result features rather than generative AI specifically."
          }
        },
        {
          "@type": "Question",
          "name": "Does scanning my site affect its performance or SEO?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Canopy Guard reads only publicly available information, the same data any search engine crawler sees. We do not touch your server, database, or code. Running a scan has zero impact on your site performance or rankings."
          }
        },
        {
          "@type": "Question",
          "name": "What does MITRE ATT&CK mean for my website?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "MITRE ATT&CK is a globally recognized framework for understanding how attackers operate. For each security finding, Canopy Guard identifies the exposure condition associated with the relevant MITRE ATT&CK technique, so you get context for what the gap actually exposes you to, not just a number. This comes from Adam's CISSP background and 20 years in cybersecurity."
          }
        },
        {
          "@type": "Question",
          "name": "What does Canopy Guard's security scan check for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Across nine security layers, Canopy Guard checks TLS and certificates, DNS, HTTP headers, HTML vulnerabilities, and exposed paths, plus four expanded capabilities: malware and reputation scanning against Google Safe Browsing and common blacklists (reported as Clean, Flagged, or Blacklisted); an expanded footprint covering Subresource Integrity on scripts and stylesheets, Secure and HttpOnly cookie flags, full TLS cipher-suite enumeration with weak-cipher warnings, and certificate transparency log presence; expanded DNS and email depth that parses SPF mechanisms and qualifiers, reports the DMARC policy as none, quarantine, or reject, and checks registrar lock and days until expiration (flagging domains expiring within 60 days as a hijacking risk); and exposed sensitive file detection for paths like /.env, /.git/config, /wp-config.php.bak, /.aws/credentials, and /admin, reporting any publicly accessible path as Critical. Every check is passive and read-only, and each finding identifies the exposure condition associated with a MITRE ATT&CK technique."
          }
        },
        {
          "@type": "Question",
          "name": "My score is low. What do I do next?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Your full report includes prioritized findings so you know exactly what to fix first. If you want to implement the recommendations yourself, the report gives you enough to work from. If you want it done for you, book a call with Adam. Canopy Guard customers receive a discount on all implementation services."
          }
        },
        {
          "@type": "Question",
          "name": "How is this different from other SEO tools?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Three things. First, GEO scoring is rare at this price point, which is free. Second, the security findings are mapped to MITRE ATT&CK, not flagged generically. Third, there is a real human behind this tool who can implement everything the audit finds. Most tools give you data. This one connects you to someone who fixes it."
          }
        },
        {
          "@type": "Question",
          "name": "Is my site data private?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Canopy Guard only scans publicly available data, the same information any search engine sees. We do not store your site's private content, login credentials, or analytics. See our Privacy Policy for full details."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need an account to get my full report?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No account required to run the scan. When you download your full report, basic contact information is collected so we can follow up if you have questions. That information is handled securely and never sold or shared with third parties."
          }
        },
        {
          "@type": "Question",
          "name": "How does Canopy Guard compare to hiring an SEO agency?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "An agency charges a monthly retainer and often reports only on traditional SEO. Canopy Guard gives you the full picture for free across SEO, AEO, GEO, and security in 30 seconds, with findings mapped to MITRE ATT&CK. When you want the work implemented, you hire Adam directly. No retainer, no account managers, just the practitioner who built the tool."
          }
        },
        {
          "@type": "Question",
          "name": "What does a good overall score look like, and what should I do if mine is low?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Above 80 is strong, 50 to 80 means clear fixable gaps, and below 50 signals problems costing you visibility or trust right now. A low score is not a verdict, it is a roadmap. Your report ranks findings by impact so you fix what matters first, and Canopy Guard customers get a discount if you want it done for you."
          }
        },
        {
          "@type": "Question",
          "name": "How often should I re-scan my site?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Re-scan after any meaningful change: a redesign, new pages, a platform migration, or after applying fixes from a previous report. For an active site, a monthly scan catches regressions before they cost you traffic. Because the scan is free and takes 30 seconds, there is no reason to wait for a problem to show up in your analytics first."
          }
        },
        {
          "@type": "Question",
          "name": "Which search engines and AI assistants does Canopy Guard check for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Canopy Guard evaluates your readiness for traditional search like Google and Bing, AI answer engines like Google AI Overviews and featured snippets, and generative assistants including ChatGPT, Gemini, Claude, and Perplexity. It inspects your structured data, llms.txt, crawler access, and content structure to estimate how each of those systems can find, parse, and cite your pages."
          }
        }
      ]
    }
    </script>
